<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3. Formulario</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <h1>A3. Formulario</h1>
    <div>
        <form>
            <label for="username">Nombre: </label>
            <input type="text" id="username" name="username" placeholder="Ingresa tu Nombre">
            <label for="apellido">Apellido: </label>
            <input type="text" id="apellido" name="apellido" placeholder="Ingresa tu Apellido">
            <label for="edad">Edad: </label>
            <input type="number" id="edad" name="edad" placeholder="Ingresa tu Edad">
            <label for="sexo">Sexo: </label><br>
            <div class="flex">
                <label for="hombre">Hombre</label>
                <input type="radio" id="hombre" name="sexo" value="hombre">
                <label for="mujer">Mujer</label>
                <input type="radio" id="mujer" name="sexo" value="mujer">
            </div>
            <label for="dirección">Dirección: </label>
            <input type="text" id="direccion" name="direccion" placeholder="Ingresa tu Direccion">
            <label for="usr">USR: </label>
            <input type="text" id="usr" name="usr" placeholder="Ingresa tu Username">
            <label for="password">Contraseña: </label>
            <input type="password" id="password" name="password" placeholder="Ingresa tu Contraseña">
            <label for="celular">Celular: </label>
            <input type="text" id="celular" name="celular" placeholder="Ingresa tu Celular">
            <label for="email">Correo Electronico: </label>
            <input type="email" id="email" name="email" placeholder="Ingresa el email">
            <label for="dir">Dir IPv4: </label>
            <input type="text" id="dir" name="dir" placeholder="Ingresa tu Dir IPv4">
            <label for="tipo-sangre">Tipo de Sangre: </label>
            <input type="text" id="tipo-sangre" name="tipo-sangre" placeholder="Ingresa tu Tipo de Sangre">
            <label for="curp">CURP: </label>
            <input type="text" id="curp" name="curp" placeholder="Ingresa tu CURP">
            <button type="submit">Enviar</button>
    </div>
</body>
</html>
